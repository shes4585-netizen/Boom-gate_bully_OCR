<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모니터링</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #2d3748;
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            transition: all 0.4s ease-in-out;
        }

        body.has-note {
            justify-content: flex-start;
            padding-top: 15px;
        }

        .siren-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.4s ease-in-out;
        }

        body.has-note .siren-container {
            margin-bottom: 10px;
        }

        .siren-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            border-radius: 6px;
        }

        .display-box {
            width: 100%;
            max-width: 210px;
            background-color: #ffffff;
            border: 4px solid #cbd5e0;
            border-radius: 12px;
            padding: 16px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            transition: all 0.4s ease-in-out;
        }

        .car-number-input {
            width: 95%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #1a202c;
            outline: none;
            padding: 0;
            margin: 0;
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        @keyframes blinkRed {
            0% { opacity: 1; color: #e53e3e; }
            50% { opacity: 0.1; color: #e53e3e; }
            100% { opacity: 1; color: #e53e3e; }
        }
        .status-warn {
            animation: blinkRed 0.8s linear infinite;
        }

        @keyframes blinkOrange {
            0% { opacity: 1; color: #dd6b20; }
            50% { opacity: 0.1; color: #dd6b20; }
            100% { opacity: 1; color: #dd6b20; }
        }
        .status-match {
            animation: blinkOrange 0.8s linear infinite;
        }

        .status-text {
            margin-top: 20px;
            font-size: 13.5px;      /* 22px 정도로 키움 (원하는 크기로 조절 가능) */
            font-weight: 800;     /* 가장 굵은 굵기로 설정 */
            color: #4a5568;
            /* 나머지 속성은 그대로 유지 */
            letter-spacing: -0.4px;
            text-align: center;
            transition: all 0.4s ease-in-out;
            width: 100%;
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }
        
        body.has-note .status-text {
            margin-top: 10px;
        }

        /* 📝 핵심 키워드 리스트 박스 디자인 */
        .note-text {
            margin-top: 12px;
            font-size: 13px;
            font-weight: bold;
            color: #c53030; /* 강조를 위해 붉은 계열 색상 차용 */
            background-color: #fffaf0;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px dashed #f6ad55;
            width: 90%;
            max-width: 210px;
            word-break: break-all;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: none;
            line-height: 1.5; /* 여러 줄 표시용 행간 배려 */
        }
    </style>
</head>
<body>

    <div class="siren-container">
        <img id="sirenLeft" src="100.png" alt="경광등" class="siren-img">
    </div>

    <div class="display-box">
        <input type="text" id="popupInput" class="car-number-input" value="" readonly>
    </div>

    <div id="statusText" class="status-text">차량 진입 대기 중</div>
    
    <div id="noteText" class="note-text"></div>

    <script>
        window.addEventListener("message", function(event) {
            if (!event.data || event.data.type !== "POPUP_SEARCH") return;

            const bodyEl = document.body;
            const inputEl = document.getElementById("popupInput");
            const imgLeft = document.getElementById("sirenLeft");
            const statusText = document.getElementById("statusText");
            const noteText = document.getElementById("noteText");
            
            const num = event.data.carNumber;
            const hasMatch = event.data.hasMatch;
            const isWarn = event.data.isWarn;
            const carNotesArray = event.data.carNotesArray || []; // 배열 데이터 수신
            
            // 리셋 초기화
            inputEl.className = "car-number-input"; 
            inputEl.style.color = "#1a202c";
            bodyEl.classList.remove("has-note");
            noteText.style.display = "none";
            noteText.innerHTML = ""; // 여러 줄 표시용 HTML 초기화

            if (!num || num.toString().trim() === "") {
                inputEl.value = "";
                imgLeft.src = "100.png";
                statusText.innerText = "차량 진입 대기 중";
                statusText.style.color = "#4a5568";
                return;
            }

            inputEl.value = num;

            // 상태값에 따른 시인성 제어
            if (hasMatch === true || hasMatch === "true") {
                if (isWarn === true || isWarn === "true") {
                    inputEl.classList.add("status-warn");
                    imgLeft.src = "100-3.gif";
                    statusText.innerText = "🚨 위험: 상습 위반 차량 진입!";
                    statusText.style.color = "#e53e3e";
                } else {
                    inputEl.classList.add("status-match");
                    imgLeft.src = "100.png";
                    statusText.innerText = "💡 관심: 과거 위반 이력 차량";
                    statusText.style.color = "#dd6b20";
                }
            } else {
                imgLeft.src = "100.png";
                statusText.innerText = "✅ 정상: 특이사항 없어영";
                statusText.style.color = "#2b6cb0";
            }

            // 🎯 오더 반영: 꺽쇠([]) 패턴 안의 핵심 단어만 추출 수집하는 매커니즘
            let combinedKeywords = [];
            
            carNotesArray.forEach(note => {
                if (!note) return;
                // 정규식 활용하여 문자열 내 모든 [내용] 패턴 검색 추출
                const matches = note.match(/\[[^\]]+\]/g);
                if (matches) {
                    matches.forEach(k => {
                        if(!combinedKeywords.includes(k)) { // 중복 단어 방지
                            combinedKeywords.push(k);
                        }
                    });
                }
            });

            // 추출 완료된 꺽쇠 키워드가 존재한다면 하단 영역 정렬 및 다중 노출 처리
            if (combinedKeywords.length > 0) {
                bodyEl.classList.add("has-note");
                
                // 검색 기록이 3개 이상이어도 줄바꿈으로 깔끔하게 결합하여 표출
                noteText.innerHTML = combinedKeywords.join("<br>"); 
                noteText.style.display = "block";
            }
        });
    </script>
</body>
</html>
