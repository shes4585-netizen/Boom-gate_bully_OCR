<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모니터링</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #2d3748;
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            transition: all 0.4s ease-in-out;
        }

        body.has-note {
            justify-content: flex-start;
            padding-top: 15px;
        }

        .siren-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.4s ease-in-out;
        }

        body.has-note .siren-container {
            margin-bottom: 10px;
        }

        .siren-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            border-radius: 6px;
        }

        .display-box {
            width: 100%;
            max-width: 210px;
            background-color: #ffffff;
            border: 4px solid #cbd5e0;
            border-radius: 12px;
            padding: 16px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            transition: all 0.4s ease-in-out;
        }

        .car-number-input {
            width: 95%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #1a202c;
            outline: none;
            padding: 0;
            margin: 0;
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        @keyframes blinkRed {
            0% { opacity: 1; color: #e53e3e; }
            50% { opacity: 0.1; color: #e53e3e; }
            100% { opacity: 1; color: #e53e3e; }
        }
        .status-warn {
            animation: blinkRed 0.8s linear infinite;
        }

        @keyframes blinkOrange {
            0% { opacity: 1; color: #dd6b20; }
            50% { opacity: 0.1; color: #dd6b20; }
            100% { opacity: 1; color: #dd6b20; }
        }
        .status-match {
            animation: blinkOrange 0.8s linear infinite;
        }

        .status-text {
            margin-top: 20px;
            font-size: 13.5px;
            font-weight: 800;
            color: #4a5568;
            letter-spacing: -0.4px;
            text-align: center;
            transition: all 0.4s ease-in-out;
            width: 100%;
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
        }
        
        body.has-note .status-text {
            margin-top: 10px;
        }

        /* 📝 핵심 키워드 리스트 박스 디자인 */
        .note-text {
            margin-top: 12px;
            font-size: 13px;
            font-weight: bold;
            color: #c53030; /* 강조를 위해 붉은 계열 색상 차용 */
            background-color: #fffaf0;
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px dashed #f6ad55;
            width: 90%;
            max-width: 210px;
            word-break: break-all;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: none;
            line-height: 1.5; /* 여러 줄 표시용 행간 배려 */
        }
    </style>
</head>
<body>

    <div class="siren-container">
        <img id="sirenLeft" src="100.png" alt="경광등" class="siren-img">
    </div>

    <div class="display-box">
        <input type="text" id="popupInput" class="car-number-input" value="" readonly>
    </div>

    <div id="statusText" class="status-text">차량 진입 대기 중</div>
    
    <div id="noteText" class="note-text"></div>

    <script>
    // 부모창(index.html)에서 넘어오는 신호 처리
        window.addEventListener("message", function(event) {
            const { carNumber, hasMatch, isWarn, carNotesArray } = event.data;

            if (carNumber === "") {
                inputEl.value = "";
                inputEl.classList.remove("status-match");
                imgLeft.src = "100.png";
                statusText.innerText = "대기 중...";
                statusText.style.color = "#2d3748";
                bodyEl.classList.remove("has-note", "alert-mode");
                noteContainer.innerHTML = "";
                return;
            }

            inputEl.value = carNumber;
            
            // 💡 [핵심] 메시지 수신 시 20초간 '항상 위' 강조 효과 적용
            bodyEl.classList.add("alert-mode");
            window.focus(); // 창 활성화

            clearTimeout(autoClearTimer);
            autoClearTimer = setTimeout(() => {
                bodyEl.classList.remove("alert-mode");
            }, 20000);

            if (hasMatch) {
                if (isWarn) {
                    inputEl.classList.add("status-match");
                    imgLeft.src = "100-warn.png";
                    statusText.innerText = "🚨 경고: 관리 대상 차량";
                    statusText.style.color = "#e53e3e";
                } else {
                    inputEl.classList.add("status-match");
                    imgLeft.src = "100.png";
                    statusText.innerText = "💡 관심: 과거 위반 이력";
                    statusText.style.color = "#dd6b20";
                }
            } else {
                imgLeft.src = "100.png";
                statusText.innerText = "✅ 정상: 특이사항 없음";
                statusText.style.color = "#2b6cb0";
            }

            let combinedKeywords = [];
            carNotesArray.forEach(note => {
                if (!note) return;
                const matches = note.match(/\[[^\]]+\]/g);
                if (matches) {
                    matches.forEach(k => { if(!combinedKeywords.includes(k)) combinedKeywords.push(k); });
                }
            });

            if (combinedKeywords.length > 0) {
                bodyEl.classList.add("has-note");
                noteContainer.innerHTML = combinedKeywords.map(k => 
                    `<div style="margin:5px; padding:8px; background:#edf2f7; border-radius:4px; font-size:14px; font-weight:bold;">${k}</div>`
                ).join("");
            } else {
                bodyEl.classList.remove("has-note");
                noteContainer.innerHTML = "";
            }
        });
    </script>
</body>
</html>
