<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모니터링</title>
    <style>
        /* 팝업창 전체를 부드럽고 굵은 누구나 읽기 쉬운 폰트로 지정 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff; /* 팝업창 전체 배경 흰색 */
            color: #2d3748;
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 🚨 경광등 컨테이너 (이전 크기로 원복) */
        .siren-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .siren-img {
            width: 75px;
            height: 75px;
            object-fit: contain;
            border-radius: 6px;
        }

        /* 📟 차량번호 표시창 영역 (이전 크기 원복 + 흰색 배경) */
        .display-box {
            width: 100%;
            max-width: 210px;
            background-color: #ffffff; /* 입력창 배경 흰색 */
            border: 4px solid #cbd5e0; /* 깔끔하고 선명한 테두리 */
            border-radius: 12px;
            padding: 16px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }

        /* 🔤 번호판 내부 텍스트 스타일 (크고 두껍게 하여 시인성 극대화) */
        .car-number-input {
            width: 95%;
            border: none;
            background: transparent;
            text-align: center;
            font-size: 36px; /* 멀리서도 잘 보이도록 폰트 크기 업 */
            font-weight: 900; /* 가장 두꺼운 굵기 */
            letter-spacing: 2px;
            color: #1a202c;
            outline: none;
            padding: 0;
            margin: 0;
            font-family: 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        }

        /* 🚨 [주의 O] 상습 위반 차량: 빨간색 굵게 깜빡임 애니메이션 */
        @keyframes blinkRed {
            0% { opacity: 1; color: #e53e3e; }
            50% { opacity: 0.1; color: #e53e3e; }
            100% { opacity: 1; color: #e53e3e; }
        }
        .status-warn {
            animation: blinkRed 0.8s linear infinite;
        }

        /* 🟢 [주의 X] 일반 위반 차량: 녹색 굵게 깜빡임 애니메이션 */
        @keyframes blinkGreen {
            0% { opacity: 1; color: #38a169; }
            50% { opacity: 0.1; color: #38a169; }
            100% { opacity: 1; color: #38a169; }
        }
        .status-match {
            animation: blinkGreen 0.8s linear infinite;
        }

        /* ℹ️ 하단 상태 안내 문구 (폰트 크기 확대 및 부드럽고 굵은 스타일) */
        .status-text {
            margin-top: 20px;
            font-size: 15px; /* 글자 크기 대폭 키움 */
            font-weight: 800; /* 굵고 명확하게 수정 */
            color: #4a5568;
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="siren-container">
        <img id="sirenLeft" src="100.png" alt="경광등" class="siren-img">
    </div>

    <div class="display-box">
        <input type="text" id="popupInput" class="car-number-input" value="" readonly>
    </div>

    <div id="statusText" class="status-text">차량 진입 대기 중</div>

    <script>
        // 📡 메인창(index.html) 무선 신호 연동 수신 안테나
        window.addEventListener("message", function(event) {
            // 1. 신호가 비어있거나 타입이 다르면 즉시 차단
            if (!event.data || event.data.type !== "POPUP_SEARCH") return;

            const inputEl = document.getElementById("popupInput");
            const imgLeft = document.getElementById("sirenLeft");
            const statusText = document.getElementById("statusText");
            
            // 2. 메인창에서 보낸 데이터 안전하게 추출
            const num = event.data.carNumber;
            const hasMatch = event.data.hasMatch;
            const isWarn = event.data.isWarn;
            
            // 3. 스타일 및 텍스트 초기화
            inputEl.className = "car-number-input"; 
            inputEl.style.color = "#1a202c";

            // 차량 번호가 아예 없거나 빈 값일 때 대기 상태 안전 회귀
            if (!num || num.toString().trim() === "") {
                inputEl.value = "";
                imgLeft.src = "100.png";
                statusText.innerText = "차량 진입 대기 중";
                statusText.style.color = "#4a5568";
                return;
            }

            // 실시간으로 전달받은 차량 번호 화면 입력창에 주입!
            inputEl.value = num;

            // 4. 스캔 차량 데이터 성격 분석 후 시인성 제어
            if (hasMatch === true || hasMatch === "true") {
                
                if (isWarn === true || isWarn === "true") {
                    // 🚨 Case A: [주의] 상습 위반 차량 -> 빨간색 글자 깜빡임 + 움짤 교체
                    inputEl.classList.add("status-warn");
                    imgLeft.src = "100-3.gif";
                    statusText.innerText = "🚨 위험: 상습 위반 차량 진입!";
                    statusText.style.color = "#e53e3e";
                } else {
                    // 🟢 Case B: [일반] 과거 위반 차량 -> 녹색 글자 깜빡임 + 기본 이미지 고정
                    inputEl.classList.add("status-match");
                    imgLeft.src = "100.png";
                    statusText.innerText = "🟢 안내: 과거 위반 이력 차량";
                    statusText.style.color = "#38a169";
                }
                
            } else {
                // ⚪ Case C: 깨끗한 정상 차량 -> 검은색 글자 유지 + 기본 이미지 고정
                imgLeft.src = "100.png";
                statusText.innerText = "❌ 정상: 위반 이력 없음";
                statusText.style.color = "#2d3748";
            }
        });
    </script>
</body>
</html>
