<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>진입로 위반차량 검색 시스템 [OCR적용버전]</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 25px; background-color: #f5f7fa; position: relative; }
        h2 { color: #1a365d; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .header-logo-box { position: absolute; top: 20px; right: 25px; display: flex; align-items: center; gap: 10px; background: linear-gradient(135deg, #1a365d, #2a4365); padding: 8px 15px; border-radius: 20px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); color: white; }
        .header-logo-box i { font-size: 18px; color: #f6ad55; }
        .header-logo-box .logo-text { font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }
        .section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .form-label-group { display: flex; flex-direction: column; gap: 4px; }
        .form-label-group label { font-size: 11px; font-weight: bold; color: #4a5568; padding-left: 2px; }
        .radio-group { display: flex; gap: 12px; padding: 8px 10px; background: #edf2f7; border-radius: 4px; height: 38px; box-sizing: border-box; align-items: center; }
        .radio-label { font-size: 13px !important; font-weight: bold; color: #2d3748; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .radio-label input { margin: 0; cursor: pointer; width: auto; height: auto; padding: 0; }
        .badge { display: inline-block; padding: 3px 8px; font-size: 12px; font-weight: bold; border-radius: 4px; }
        .badge-member { background-color: #ebf8ff; color: #2b6cb0; border: 1px solid #bee3f8; }
        .badge-normal { background-color: #f7fafc; color: #4a5568; border: 1px solid #e2e8f0; }
        input, select { padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; background-color: white; }
        .input-search { border: 2px solid #1a365d; font-size: 16px; width: 280px; font-weight: bold; }
        .edit-input { width: 100%; padding: 4px; font-size: 13px; border: 1px solid #3182ce; border-radius: 4px; text-align: center; }
        .edit-input-note { text-align: left; padding-left: 8px; }
        .edit-datetime-container { display: flex; flex-direction: column; gap: 2px; align-items: center; }
        .edit-time-selects { display: flex; gap: 2px; width: 100%; }
        .edit-time-selects select { padding: 2px; font-size: 12px; height: 24px; flex: 1; text-align: center; }
        button { padding: 10px 15px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #2b6cb0; color: white; height: 41px; margin-top: 15px; }
        .btn-add:hover { background-color: #2c5282; }
        .btn-popup-open { background-color: #e53e3e; color: white; font-size: 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.15); }
        .btn-popup-open:hover { background-color: #9b2c2c; }
        .btn-edit { background-color: #dd6b20; color: white; padding: 5px 8px; font-size: 12px; margin-right: 2px; }
        .btn-save { background-color: #3182ce; color: white; padding: 5px 8px; font-size: 12px; margin-right: 2px; }
        .btn-cancel { background-color: #718096; color: white; padding: 5px 8px; font-size: 12px; margin-right: 2px; }
        .btn-del { background-color: #e53e3e; color: white; padding: 5px 8px; font-size: 12px; }
        .btn-backup { background-color: #4a5568; color: white; margin-right: 5px; }
        .btn-restore { background-color: #805ad5; color: white; }
        .file-label { display: inline-block; padding: 10px 15px; background-color: #dd6b20; color: white; font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background-color: white; }
        th, td { border: 1px solid #cbd5e0; padding: 8px 4px; text-align: center; font-size: 13px; word-break: break-all; vertical-align: middle; }
        th { background-color: #2d3748; color: white; font-weight: bold; }
        tr:nth-child(even) { background-color: #f7fafc; }
        th.th-warn { background-color: #742a2a; cursor: pointer; user-select: none; position: relative; }
        .row-focus td { background-color: #fbd38d !important; color: #1a202c !important; font-weight: bold !important; }
        .no-result { color: #e53e3e; font-weight: bold; margin-top: 15px; font-size: 16px; }
        .pagination-container { display: flex; justify-content: center; align-items: center; margin-top: 20px; gap: 5px; }
        .page-btn { padding: 6px 12px; background-color: white; border: 1px solid #e2e8f0; border-radius: 4px; color: #4a5568; font-weight: bold; cursor: pointer; }
        .page-btn.active { background-color: #4a5568; color: white; border-color: #4a5568; pointer-events: none; }
        .info-notice-box { background-color: #102a43; color: #ffffff; padding: 15px 18px; border-radius: 6px; font-size: 14px; line-height: 1.7; border-left: 5px solid #ecc94b; }
        .warn-blink-dot { display: inline-block; width: 14px; height: 14px; background-color: #e53e3e; border-radius: 50%; animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="header-logo-box">
        <i class="fa-solid fa-shield-halved"></i>
        <span class="logo-text">수푸자21 .Since 25</span>
    </div>
    <h2>
        <img src="100-4.png" alt="로고" style="height: 60px; width: auto; vertical-align: middle; border-radius: 4px;">
        진입로 위반차량 검색 시스템 [OCR적용버전]
    </h2>
    <div class="section" style="background-color: #ebf8ff; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #2b6cb0; margin-bottom: 12px;">
        <span style="font-weight: bold; color: #2b6cb0;"><i class="fa-solid fa-building"></i> 수푸자 참교육방</span>
        <button class="btn-popup-open" onclick="openSearchPopup()"><i class="fa-solid fa-bolt"></i> 미니 입력 팝업창 열기</button>
    </div>
    <div class="section">
        <h3>🔍 위반 차량 검색 및 파일 관리</h3>
        <input type="text" id="searchInput" class="input-search" onkeyup="searchCar()" placeholder="차량번호 뒤 4자리를 입력하세요" maxlength="4">
        <table>
            <thead>
                <tr><th>주의</th><th>구분</th><th>입차 일시</th><th>출차 일시</th><th>체류 시간</th><th>차량번호</th><th>동</th><th>호수</th><th>비고</th><th>관리</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div id="noResult" class="no-result" style="display:none;">❌ 위반이력이 없습니다</div>
    </div>
    <script>
        let carData = JSON.parse(localStorage.getItem("carData")) || [];
        let popupWindow = null;
        let autoClearTimer = null;

        // 🎯 깃허브 경로 최적화: 절대 주소로 타격
        function openSearchPopup() {
            const popupWidth = 230; const popupHeight = 380;
            const left = (window.screen.width/2) - (popupWidth/2);
            const top = (window.screen.height/2) - (popupHeight/2);
            // 깃허브 주소를 자동 구성
            const finalPopupUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + "/popup.html";
            popupWindow = window.open(finalPopupUrl, "carPopup", `width=${popupWidth},height=${popupHeight},top=${top,left},left=${left}`);
        }

        // 15초 후 자동 초기화
        function clearSearchAndPopup() {
            document.getElementById("searchInput").value = "";
            if (popupWindow && !popupWindow.closed) {
                popupWindow.postMessage({type: "POPUP_SEARCH", carNumber: "", hasMatch: false}, "*");
                popupWindow.blur();
                window.blur();
            }
        }

        function searchCar() {
            const input = document.getElementById("searchInput").value.trim();
            if (popupWindow && !popupWindow.closed && input.length === 4) {
                popupWindow.postMessage({ type: "POPUP_SEARCH", carNumber: input }, "*");
                popupWindow.focus();
                clearTimeout(autoClearTimer);
                autoClearTimer = setTimeout(clearSearchAndPopup, 15000);
            }
        }

        function connectOCRWebSocket() {
            const socket = new WebSocket("ws://localhost:8080");
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.type === "AUTO_DETECT") {
                    document.getElementById("searchInput").value = data.carNumber;
                    searchCar();
                }
            };
        }
        connectOCRWebSocket();
    </script>
</body>
</html>
